<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso Becario | Feria de Servicio Social</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Lexend', sans-serif; }
  .bg-artistic-gradient {
    background: linear-gradient(135deg, #7e22ce 0%, #6b21a8 50%, #9333ea 100%);
    background-size: 400% 400%;
    animation: gradientAnimation 15s ease infinite;
  }
  @keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
</style>
</head>
<body class="bg-artistic-gradient min-h-screen flex items-center justify-center p-4">

<main class="w-full max-w-5xl h-[75vh] flex flex-col">
<div class="bg-white/95 rounded-3xl shadow-2xl h-full flex flex-col justify-center p-16 md:p-24">

  <header class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-24 h-24 bg-slate-50 rounded-3xl mb-8">
      <svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="text-5xl font-bold text-slate-800 tracking-tight">Acceso Becario</h1>
    <p class="text-slate-500 text-xl mt-4">Panel exclusivo para becarios de Servicio Social</p>
  </header>

  <form id="login-form" class="space-y-8 max-w-2xl mx-auto w-full">
    <div class="space-y-2">
      <label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1" for="username">Correo</label>
      <input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all outline-none text-slate-700 text-xl"
        id="username" placeholder="becario@feria.mx" required type="email"/>
    </div>

    <div class="space-y-2">
      <label class="text-base font-semibold text-slate-600 uppercase tracking-wider" for="password">Contraseña</label>
      <input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all outline-none text-slate-700 text-xl"
        id="password" placeholder="••••••••" required type="password"/>
    </div>

    <!-- Mensaje de error -->
    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-2xl px-6 py-4 text-base"></div>

    <button id="submit-btn" type="submit"
      class="w-full bg-slate-900 text-white font-semibold py-6 rounded-2xl hover:bg-slate-800 active:scale-[0.98] transition-all shadow-xl mt-10 text-2xl flex items-center justify-center gap-3">
      <span id="btn-text">Ingresar</span>
      <svg id="btn-spinner" class="hidden animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
    </button>
  </form>

</div>
</main>

<script>
  const API = 'http://127.0.0.1:8000/api/v1';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const spinner  = document.getElementById('btn-spinner');
    const btnText  = document.getElementById('btn-text');

    errorMsg.classList.add('hidden');
    spinner.classList.remove('hidden');
    btnText.textContent = 'Ingresando...';

    try {
      const res = await fetch(`${API}/users/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'Credenciales incorrectas');
      }

      // Verificar que sea intern/becario
      if (data.role !== 'intern') {
        throw new Error('No tienes permisos de becario');
      }

      // Guardar token y redirigir
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      window.location.href = 'becario_dashboard.html';

    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.remove('hidden');
    } finally {
      spinner.classList.add('hidden');
      btnText.textContent = 'Ingresar';
    }
  });
</script>

</body></html>
