<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Inscripciones | Feria de Servicio Social</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'Lexend', sans-serif; margin: 0; overflow-x: hidden; }

    .bg-student-catalog {
      background: linear-gradient(-45deg, #0a1633, #10214d, #18356f, #2450a6, #3b82f6, #7db7ff);
      background-size: 400% 400%;
      animation: blueFlow 14s ease infinite;
    }
    @keyframes blueFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-shell {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
    }

    .enrollment-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .enrollment-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(15, 23, 61, 0.10);
    }

    .fade-item { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge-enrolled  { background:#dbeafe; color:#1d4ed8; }
    .badge-checkin   { background:#dcfce7; color:#15803d; }
    .badge-presencial { background:#dcfce7; color:#15803d; }
    .badge-remoto     { background:#dbeafe; color:#1d4ed8; }
    .badge-mixto      { background:#f3e8ff; color:#7c3aed; }
  </style>
</head>

<body class="bg-student-catalog min-h-screen p-4 md:p-8">

  <button onclick="window.location.href='catalogo_opciones.html'" class="fixed top-6 left-6 z-50 bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-full flex items-center gap-2 hover:bg-white/30 transition-all shadow-lg">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="font-medium text-sm">Volver al Catálogo</span>
  </button>

  <main class="glass-shell max-w-5xl mx-auto rounded-[2.5rem] overflow-hidden min-h-[90vh] flex flex-col">

    <!-- ── Header ── -->
    <section class="px-6 md:px-12 pt-6 pb-8 border-b border-slate-200/60">
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div class="fade-item">
          <span class="inline-block px-4 py-1.5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold uppercase tracking-wider mb-4">
            Portal del Estudiante
          </span>
          <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900">Mis Inscripciones</h1>
          <p class="text-slate-500 text-lg mt-3">Historial de todos tus proyectos por período.</p>
        </div>
        <button onclick="window.location.href='catalogo_opciones.html'"
          class="px-6 py-3 rounded-2xl bg-[#0f173d] text-white font-bold hover:bg-[#1e2a5a] transition-all shadow-sm flex items-center gap-2 w-fit">
          <span class="material-symbols-outlined text-[18px]">grid_view</span>
          Ver catálogo de proyectos
        </button>
      </div>

      <!-- Contador -->
      <div id="counter-bar" class="hidden mt-6 flex items-center gap-3 fade-item" style="animation-delay:0.1s">
        <div class="px-5 py-2.5 bg-[#0f173d] text-white rounded-2xl text-sm font-bold">
          <span id="total-count">0</span> inscripciones en total
        </div>
      </div>
    </section>

    <!-- ── Contenido ── -->
    <section class="flex-1 px-6 md:px-12 py-10">

      <!-- Loading -->
      <div id="loading-state" class="flex flex-col items-center justify-center py-24 gap-4 text-slate-400">
        <svg class="animate-spin h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <p class="font-medium">Cargando inscripciones…</p>
      </div>

      <!-- Sin inscripciones -->
      <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center gap-3 text-slate-400 fade-item">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p class="font-semibold text-lg">No tienes inscripciones todavía.</p>
        <p class="text-sm">Explora el catálogo y selecciona un proyecto.</p>
        <button onclick="location.href='catalogo_opciones.html'"
          class="mt-4 px-6 py-3 bg-[#0f173d] text-white rounded-2xl font-bold text-sm hover:bg-[#1e2a5a] transition-colors">
          Ver catálogo
        </button>
      </div>

      <!-- Lista por período -->
      <div id="enrollments-container"></div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://127.0.0.1:8000/api/v1';
    const token = localStorage.getItem('token');
    if (!token) location.href = 'acceso_estudiante.html';

    const MODALITY_BADGE = {
      'Presencial': 'badge-presencial',
      'Remoto':     'badge-remoto',
      'Mixto':      'badge-mixto',
    };

    const MODALITY_ICON = {
      'Presencial': 'location_on',
      'Remoto':     'computer',
      'Mixto':      'sync_alt',
    };

    async function cargarInscripciones() {
      try {
        const res = await fetch(`${API_BASE}/students/me/history`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        document.getElementById('loading-state').classList.add('hidden');

        if (res.status === 401) { location.href = 'acceso_estudiante.html'; return; }
        if (!res.ok) { mostrarVacio(); return; }

        const data = await res.json();

        if (!data.items || data.items.length === 0) { mostrarVacio(); return; }

        document.getElementById('total-count').textContent = data.total;
        document.getElementById('counter-bar').classList.remove('hidden');
        document.getElementById('counter-bar').classList.add('flex');

        // Agrupar por período
        const byPeriod = {};
        data.items.forEach(item => {
          if (!byPeriod[item.period_id]) {
            byPeriod[item.period_id] = { name: item.period_name, items: [] };
          }
          byPeriod[item.period_id].items.push(item);
        });

        renderEnrollments(byPeriod);
      } catch (err) {
        document.getElementById('loading-state').classList.add('hidden');
        mostrarVacio();
        console.error(err);
      }
    }

    function mostrarVacio() {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('empty-state').classList.add('flex');
    }

    function renderEnrollments(byPeriod) {
      const container = document.getElementById('enrollments-container');
      container.innerHTML = '';

      Object.values(byPeriod).forEach((group, gi) => {
        const section = document.createElement('div');
        section.className = 'mb-10 fade-item';
        section.style.animationDelay = `${gi * 0.1}s`;

        section.innerHTML = `
          <div class="flex items-center gap-3 mb-5">
            <div class="w-2 h-8 bg-[#0f173d] rounded-full"></div>
            <h2 class="text-xl font-extrabold text-slate-800">${group.name}</h2>
            <span class="px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-full">
              ${group.items.length} proyecto${group.items.length !== 1 ? 's' : ''}
            </span>
          </div>
          <div class="space-y-4" id="period-group-${gi}"></div>
        `;
        container.appendChild(section);

        const groupEl = section.querySelector(`#period-group-${gi}`);
        group.items.forEach((item, i) => {
          const statusBadge = item.status === 'CHECKED_IN'
            ? `<span class="badge-checkin px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                 <span class="material-symbols-outlined text-[12px]">verified</span> Check-in ✓
               </span>`
            : `<span class="badge-enrolled px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                 <span class="material-symbols-outlined text-[12px]">how_to_reg</span> Inscrito
               </span>`;

          const modalityBadge = item.modality
            ? `<span class="${MODALITY_BADGE[item.modality] || 'badge-presencial'} px-2.5 py-1 rounded-full text-[10px] font-bold flex items-center gap-1">
                 <span class="material-symbols-outlined text-[11px]">${MODALITY_ICON[item.modality] || 'location_on'}</span>
                 ${item.modality}
               </span>`
            : '';

          // Códigos eliminados

          const creditInfo = item.credit_hours
            ? `<div class="flex items-center gap-1.5 text-xs text-amber-600 font-semibold">
                 <span class="material-symbols-outlined text-[14px]">schedule</span>
                 ${item.credit_hours} hrs crédito
               </div>`
            : '';

          const locationInfo = item.location
            ? `<div class="flex items-center gap-1.5 text-xs text-slate-400">
                 <span class="material-symbols-outlined text-[14px]">location_on</span>
                 ${item.location}
               </div>`
            : '';

          const enrollDate = new Date(item.enrolled_at).toLocaleDateString('es-MX', {
            day: 'numeric', month: 'long', year: 'numeric'
          });

          groupEl.insertAdjacentHTML('beforeend', `
            <div class="enrollment-card bg-white rounded-2xl border border-slate-200 p-6 fade-item"
              style="animation-delay:${(gi * 0.1) + (i * 0.05)}s">
              <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                <div class="flex-1">
                  <div class="flex items-center gap-2 flex-wrap mb-2">
                    ${modalityBadge}
                  </div>
                  <h3 class="text-lg font-extrabold text-slate-900 leading-tight">${item.title}</h3>
                  <p class="text-blue-600 font-semibold text-sm mt-0.5">${item.company}</p>
                  <div class="flex items-center gap-4 mt-3 flex-wrap">
                    ${creditInfo}
                    ${locationInfo}
                    <div class="flex items-center gap-1.5 text-xs text-slate-400">
                      <span class="material-symbols-outlined text-[14px]">calendar_today</span>
                      Inscrito el ${enrollDate}
                    </div>
                  </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                  ${statusBadge}
                </div>
              </div>
            </div>
          `);
        });
      });
    }

    document.addEventListener('DOMContentLoaded', cargarInscripciones);
  </script>
</body>
</html>
