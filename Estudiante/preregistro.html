<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background-light": "#dbeafe",
            "background-dark": "#111827",
            "navy-accent": "#0f173d",
            "navy-hover": "#18245c",
            "border-soft": "#d6e0ea",
            "field-bg": "#f8fafc"
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "2xl": "1rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>

  <title>Pre-Registro | Feria de Servicio Social</title>

  <style>
    body {
      font-family: 'Lexend', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .animated-blue-bg {
      background: linear-gradient(-45deg, #0a1633, #10214d, #18356f, #2450a6, #3b82f6, #7db7ff);
      background-size: 400% 400%;
      animation: blueLava 14s ease infinite;
    }

    @keyframes blueLava {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    .back-link {
      transition: all 0.25s ease;
    }

    .back-link:hover {
      transform: translateX(-4px);
      color: #0f173d;
    }

    .submit-button {
      background-color: #0f173d;
      transition: all 0.25s ease;
    }

    .submit-button:hover {
      background-color: #18245c;
      transform: translateY(-1px);
    }
  </style>
</head>

<body class="animated-blue-bg font-display text-slate-900 min-h-screen flex flex-col">
  <main class="flex-grow flex items-center justify-center p-4 md:p-8">
    <div class="w-full max-w-3xl bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl border border-white/30 overflow-hidden">
      <div class="p-8 md:p-12">
        <div class="text-center mb-10">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl mb-5">
            <span class="material-symbols-outlined text-blue-700 text-3xl">edit_note</span>
          </div>

          <h1 class="text-4xl font-bold text-navy-accent mb-3">Pre-Registro</h1>
          <p class="text-slate-500 text-base md:text-lg max-w-xl mx-auto">
            Completa el formulario para registrar tu participación en la Feria de Servicio Social 2026.
          </p>
        </div>

        <form class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-navy-accent">Nombre completo</label>
              <input
                class="w-full px-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all"
                placeholder="Ingresa tu nombre completo"
                type="text"
              />
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-navy-accent">Matrícula</label>
              <input
                class="w-full px-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all"
                placeholder="A0xxxxxxx"
                type="text"
              />
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-navy-accent">Correo institucional</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                alternate_email
              </span>
              <input
                class="w-full pl-11 pr-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all"
                placeholder="usuario@tec.mx"
                type="email"
              />
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-navy-accent">Correo personal</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                mail
              </span>
              <input
                class="w-full pl-11 pr-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all"
                placeholder="ejemplo@gmail.com"
                type="email"
              />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-navy-accent">Día</label>
              <div class="relative">
                <select class="w-full appearance-none px-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all pr-10">
                  <option value="">Selecciona una fecha</option>
                  <option value="2026-10-24">Octubre 24, 2026</option>
                  <option value="2026-10-25">Octubre 25, 2026</option>
                </select>
                <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                  calendar_today
                </span>
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-navy-accent">Hora</label>
              <div class="relative">
                <select class="w-full appearance-none px-4 py-3 rounded-xl border border-border-soft bg-field-bg focus:ring-2 focus:ring-blue-400/30 focus:border-blue-500 outline-none transition-all pr-10">
                  <option value="">Selecciona un horario</option>
                  <option value="09:00">09:00 AM (Cupo: 100)</option>
                  <option value="09:30">09:30 AM (Cupo: 100)</option>
                  <option value="10:00">10:00 AM (Cupo: 100)</option>
                  <option value="10:30">10:30 AM (Cupo: 100)</option>
                  <option value="11:00">11:00 AM (Cupo: 100)</option>
                  <option value="11:30">11:30 AM (Cupo: 100)</option>
                  <option value="12:00">12:00 PM (Cupo: 100)</option>
                  <option value="12:30">12:30 PM (Cupo: 100)</option>
                  <option value="13:00">01:00 PM (Cupo: 100)</option>
                  <option value="13:30">01:30 PM (Cupo: 100)</option>
                  <option value="14:00">02:00 PM (Cupo: 100)</option>
                </select>
                <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                  schedule
                </span>
              </div>
            </div>
          </div>

          <div class="pt-4">
            <button class="w-full submit-button text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2" type="submit">
              <span>Registrarse</span>
              <span class="material-symbols-outlined">send</span>
            </button>
          </div>

          <div class="pt-2 flex justify-end">
            <button
              type="button"
              onclick="window.location.href='estudiante_inicio.html'"
              class="back-link flex items-center gap-2 text-slate-600 font-semibold text-sm md:text-base"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              Volver
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="w-full py-8 text-center">
    <p class="text-xs font-semibold tracking-widest text-white/70 uppercase">
      TECNOLÓGICO DE MONTERREY — SERVICIO SOCIAL 2026
    </p>
  </footer>
</body>
</html>
