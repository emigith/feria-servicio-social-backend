<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso Estudiante | Feria de Servicio Social</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Lexend', sans-serif; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-blue-50">

<main class="w-full max-w-5xl h-[75vh] flex flex-col">
<div class="bg-white/95 rounded-3xl shadow-2xl h-full flex flex-col justify-center p-16 md:p-24">

  <header class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-24 h-24 bg-slate-50 rounded-3xl mb-8">
      <svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="text-5xl font-bold text-slate-800 tracking-tight">Acceso Estudiante</h1>
    <p class="text-slate-500 text-xl mt-4">Ingresa tu matrícula y el código OTP que recibiste</p>
  </header>

  <form id="login-form" class="space-y-8 max-w-2xl mx-auto w-full">
    <div class="space-y-2">
      <label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1" for="matricula">Matrícula</label>
      <input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all outline-none text-slate-700 text-xl"
        id="matricula" placeholder="A01234567" required type="text"/>
    </div>

    <div class="space-y-2">
      <label class="text-base font-semibold text-slate-600 uppercase tracking-wider" for="otp">Código OTP</label>
      <input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all outline-none text-slate-700 text-xl tracking-widest text-center"
        id="otp" placeholder="123456" required type="text" maxlength="6" inputmode="numeric"/>
    </div>

    <!-- Mensaje de error -->
    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-2xl px-6 py-4 text-base"></div>

    <!-- Mensaje de éxito -->
    <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-2xl px-6 py-4 text-base"></div>

    <button id="submit-btn" type="submit"
      class="w-full bg-slate-900 text-white font-semibold py-6 rounded-2xl hover:bg-slate-800 active:scale-[0.98] transition-all shadow-xl mt-10 text-2xl flex items-center justify-center gap-3">
      <span id="btn-text">Ingresar a la Feria</span>
      <svg id="btn-spinner" class="hidden animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
    </button>
  </form>

</div>
</main>

<script>
  const API = 'http://127.0.0.1:8000/api/v1';

  // Mensajes de error amigables
  const errorMessages = {
    'STUDENT_NOT_FOUND':    'No encontramos tu matrícula. Verifica que esté bien escrita.',
    'OTP_NOT_FOUND':        'No hay un código OTP activo. Pide al becario que te envíe uno.',
    'OTP_EXPIRED':          'El código OTP expiró. Pide al becario que te envíe uno nuevo.',
    'OTP_INVALID':          'El código OTP es incorrecto. Verifica el número.',
    'OTP_ALREADY_USED':     'Este código ya fue usado. Pide al becario un nuevo OTP.',
    'ALREADY_CHECKED_IN':   'Ya realizaste tu check-in. Puedes entrar a la feria.',
  };

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const matricula = document.getElementById('matricula').value.trim().toUpperCase();
    const otp_code  = document.getElementById('otp').value.trim();
    const errorMsg  = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const spinner   = document.getElementById('btn-spinner');
    const btnText   = document.getElementById('btn-text');

    // Reset mensajes
    errorMsg.classList.add('hidden');
    successMsg.classList.add('hidden');

    // Validación básica
    if (otp_code.length !== 6 || !/^\d+$/.test(otp_code)) {
      errorMsg.textContent = 'El código OTP debe ser de 6 dígitos numéricos.';
      errorMsg.classList.remove('hidden');
      return;
    }

    spinner.classList.remove('hidden');
    btnText.textContent = 'Verificando...';

    try {
      const res = await fetch(`${API}/students/checkin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matricula, otp_code }),
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = errorMessages[data.detail] || data.detail || 'Error al ingresar. Intenta de nuevo.';
        throw new Error(msg);
      }

      // Check-in exitoso — guardar token y redirigir
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', 'student');

      successMsg.textContent = '¡Check-in exitoso! Entrando a la feria...';
      successMsg.classList.remove('hidden');

      setTimeout(() => {
        window.location.href = 'estudiante_inicio.html';
      }, 1500);

    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.remove('hidden');
    } finally {
      spinner.classList.add('hidden');
      btnText.textContent = 'Ingresar a la Feria';
    }
  });
</script>

</body></html>
