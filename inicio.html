<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Feria de Servicio Social - TEC CCM</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'tec-purple': '#2d2079',
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
<!-- END: Custom Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="layout-and-effects">
    body {
      background-color: #2d2079;
      margin: 0;
      color: white;
      overflow-x: hidden;
    }

    /* Glassmorphism effect for buttons */
    .glass-button {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .glass-button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* Logo container hover effect */
    .logo-container {
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }
    
    .logo-container:hover {
      transform: scale(1.05);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="antialiased flex flex-col items-center justify-center min-h-screen w-full">
<!-- BEGIN: MainContent -->
<main class="flex flex-col items-center justify-center w-full max-w-4xl px-6 text-center" data-purpose="landing-container">
<!-- BEGIN: Central Logo -->
<div class="logo-container mb-8" data-purpose="secret-button">
<!-- Using provided colorful logo from IMAGE_21 -->
<img alt="TEC CCM Logo" class="w-48 h-auto md:w-64 shadow-none" id="central-logo" src="{{DATA:IMAGE:IMAGE_11}}"/>
</div>
<!-- END: Central Logo -->
<!-- BEGIN: Typography -->
<div class="mb-12" data-purpose="header-titles">
<h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-2">
        TEC CCM
      </h1>
<p class="text-lg md:text-xl font-light tracking-[0.3em] uppercase opacity-90">
        Feria de Servicio Social
      </p>
</div>
<!-- END: Typography -->
<!-- BEGIN: User Selection -->
<div class="flex flex-col items-center w-full" data-purpose="user-selection-area">
<p class="text-sm font-bold tracking-[0.2em] mb-8 opacity-80 uppercase">
        Selecciona tu usuario
      </p>
<!-- Buttons Container -->
<div class="flex flex-col sm:flex-row gap-6 w-full justify-center">
<!-- Socio Formador Button -->
<button class="flex flex-col items-center justify-center p-8 rounded-3xl w-full sm:w-64 aspect-square md:aspect-auto md:h-48 bg-white text-tec-purple" data-purpose="role-button">
<!-- Briefcase Icon -->
<svg class="w-12 h-12 mb-4" fill="none" stroke="#2d2079" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-xl font-semibold">Socio Formador</span>
</button>
<!-- Alumno Button -->
<button class="flex flex-col items-center justify-center p-8 rounded-3xl w-full sm:w-64 aspect-square md:aspect-auto md:h-48 bg-white text-tec-purple" data-purpose="role-button">
<!-- Graduation Cap Icon -->
<svg class="w-12 h-12 mb-4" fill="none" stroke="#2d2079" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l9-5-9-5-9 5 9 5z"></path>
<path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
<path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-xl font-semibold">Alumno</span>
</button>
</div>
</div>
<!-- END: User Selection -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: Footer -->
<footer class="bottom-8 w-full text-center px-4 mt-12" data-purpose="page-footer">
<p class="text-[10px] md:text-xs tracking-[0.4em] uppercase opacity-50 font-medium">
      Tecnológico de Monterrey — Servicio Social 2026
    </p>
</footer>
<!-- END: Footer -->
<!-- BEGIN: Scripts -->
<script data-purpose="interaction-logic">
    // Add logic for the 'secret' logo button if needed
    document.getElementById('central-logo').addEventListener('click', () => {
      console.log('Secret button clicked');
    });
  </script>
<!-- END: Scripts -->
</body></html>
