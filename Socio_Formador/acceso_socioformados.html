<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Socio Formador | Feria de Servicio Social</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Lexend', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .bg-gold-lava {
      background: linear-gradient(
        -45deg,
        #854d0e,
        #ca8a04,
        #f59e0b,
        #fbbf24,
        #ca8a04
      );
      background-size: 400% 400%;
      animation: goldFlow 10s ease infinite;
    }

    @keyframes goldFlow {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.25),
        0 0 40px rgba(202, 138, 4, 0.18);
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gold-button {
      background-color: #ca8a04;
      transition: all 0.25s ease;
    }

    .gold-button:hover {
      background-color: #a16207;
      transform: translateY(-2px);
    }

    .back-link {
      transition: all 0.25s ease;
    }

    .back-link:hover {
      transform: translateX(-4px);
      color: #a16207;
    }

    .error-box {
      display: none;
      opacity: 0;
      transform: translateY(-6px);
      transition: all 0.3s ease;
    }

    .error-box.show {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-gold-lava min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-5xl min-h-[75vh] flex flex-col">
    <div class="glass-card rounded-3xl p-8 md:p-16 h-full flex flex-col justify-center">

      <header class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-yellow-100 rounded-3xl mb-8">
          <svg class="w-12 h-12 text-yellow-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold text-slate-800 tracking-tight">
          Acceso Socio Formador
        </h1>

        <p class="text-slate-500 text-lg md:text-xl mt-4 max-w-2xl mx-auto">
          Accede al panel para gestionar tus programas y vincular oportunidades de servicio social con estudiantes.
        </p>
      </header>

      <form class="space-y-8 max-w-2xl mx-auto w-full" id="login-form">
        <div class="space-y-2">
          <label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1">
            Usuario
          </label>
          <input
            class="w-full px-6 py-5 bg-slate-50 border border-slate-200 hover:border-yellow-400 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:ring-offset-2 outline-none text-slate-700 text-xl transition-all"
            placeholder="socio.formador"
            id="username"
            type="text"
          />
        </div>

        <div class="space-y-2">
          <label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1">
            Contraseña
          </label>
          <input
            class="w-full px-6 py-5 bg-slate-50 border border-slate-200 hover:border-yellow-400 rounded-2xl focus:ring-2 focus:ring-yellow-500 focus:ring-offset-2 outline-none text-slate-700 text-xl transition-all"
            placeholder="••••••••"
            id="password"
            type="password"
          />
        </div>

        <div id="error-message" class="error-box items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl px-5 py-4">
          <svg class="w-6 h-6 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 9v3.75m0 3.75h.008"></path>
            <path d="M10.29 3.86L1.82 18a2.25 2.25 0 001.93 3.375h16.5A2.25 2.25 0 0022.18 18L13.71 3.86a2.25 2.25 0 00-3.42 0z"></path>
          </svg>
          <div>
            <p class="font-semibold">Acceso denegado</p>
            <p class="text-sm">Credenciales incorrectas. Inténtalo nuevamente.</p>
          </div>
        </div>

        <button class="w-full gold-button text-white font-semibold py-6 rounded-2xl shadow-xl text-2xl">
          Ingresar
        </button>
      </form>

      <div class="w-full flex justify-end mt-8">
        <button onclick="window.location.href='../index.html'" class="back-link flex items-center gap-2 text-slate-600 font-semibold text-lg">
          ← Volver
        </button>
      </div>

    </div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errorMessage = document.getElementById("error-message");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "socio.formador" && pass === "123456") {
        errorMessage.classList.remove("show");
        window.location.href = "portal_SF.html";
      } else {
        errorMessage.classList.add("show");
      }
    });
  </script>
</body>
</html>
