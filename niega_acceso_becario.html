<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso Administrativo | Feria de Servicio Social</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Import: Lexend -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Lexend', sans-serif;
    }
  </style>
<style data-purpose="custom-background">
    /* Updated to a vibrant, energetic purple gradient */
    .bg-artistic-gradient {
      background: linear-gradient(135deg, #7e22ce 0%, #6b21a8 50%, #9333ea 100%);
      background-size: 400% 400%;
      animation: gradientAnimation 15s ease infinite;
    }

    @keyframes gradientAnimation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-overlay {
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }
  </style>
</head>
<body class="bg-artistic-gradient min-h-screen flex items-center justify-center p-4 bg-purple-900">
<!-- BEGIN: AdminAccessCard -->
<main class="w-full max-w-5xl h-[75vh] flex flex-col" data-purpose="admin-panel-container">
<div class="bg-white/95 rounded-3xl shadow-2xl p-8 md:p-10 transition-all hover:shadow-3xl h-full flex flex-col justify-center p-16 md:p-24">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-8" data-purpose="card-header">
<div class="inline-flex items-center justify-center w-24 h-24 bg-slate-50 rounded-3xl mb-8">
<!-- Minimalist Admin Icon -->
<svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<h1 class="text-5xl font-bold text-slate-800 tracking-tight">Acceso Becario</h1>
<p class="text-slate-500 text-xl mt-4">Panel exclusivo para coordinadores de Servicio Social</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-8 max-w-2xl mx-auto w-full" data-purpose="login-form" method="POST">
<!-- User Input -->
<div class="bg-red-50 border border-red-200 rounded-2xl p-4 flex items-center space-x-3 mb-6" id="login-error-message">
<svg class="w-6 h-6 text-red-500 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-red-700 font-medium text-lg">Usuario o contraseña incorrectos. Por favor, inténtalo de nuevo.</span>
</div><div class="space-y-2">
<label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1" for="username">Usuario</label>
<div class="relative">
<input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:border-transparent transition-all outline-none text-slate-700 text-xl focus:ring-purple-500" id="username" name="username" placeholder="admin.social" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-base font-semibold text-slate-600 uppercase tracking-wider" for="password">Contraseña</label>
</div>
<div class="relative">
<input class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:border-transparent transition-all outline-none text-slate-700 text-xl focus:ring-purple-500" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-slate-900 text-white font-semibold py-6 rounded-2xl hover:bg-slate-800 transform active:scale-[0.98] transition-all shadow-xl mt-10 text-2xl" type="submit">
          Ingresar
        </button>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: ExclusiveOptions -->
<!-- END: ExclusiveOptions -->
</div>
<!-- BEGIN: FooterBranding -->
<!-- END: FooterBranding -->
</main>
<!-- END: AdminAccessCard -->
</body></html>
