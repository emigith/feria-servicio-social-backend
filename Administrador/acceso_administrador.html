<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Acceso Administrativo | Feria de Servicio Social</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Lexend', sans-serif; }
    .bg-orange-lava {
      background: linear-gradient(-45deg, #7c2d12, #9a3412, #c2410c, #ea580c, #f97316);
      background-size: 400% 400%;
      animation: orangeLava 14s ease infinite;
    }
    @keyframes orangeLava {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass-overlay {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .orange-button {
      background-color: #9a3412;
      transition: all 0.2s ease;
    }
    .orange-button:hover {
      background-color: #7c2d12;
      transform: translateY(-1px);
    }
    .error-box { display: none; opacity: 0; transition: all 0.3s ease; }
    .error-box.show { display: flex; opacity: 1; }
  </style>
</head>

<body class="min-h-screen bg-orange-lava flex items-center justify-center p-4">
  <main class="w-full max-w-4xl">
    <div class="grid md:grid-cols-2 overflow-hidden rounded-[2rem] shadow-2xl bg-white/90 glass-overlay">

      <section class="hidden md:flex flex-col justify-center bg-[#1e293b] text-white p-10 lg:p-12 border-r border-white/10">
        <div class="mb-6">
          <h1 class="text-3xl lg:text-4xl font-bold leading-tight mb-4 text-orange-500">
            Control Administrativo
          </h1>
          <p class="text-slate-400 text-sm leading-relaxed">
            Portal de gestión estratégica para coordinadores y supervisores de la Feria de Servicio Social.
          </p>
        </div>
        <div class="space-y-4 pt-4 border-t border-white/5">
          <p class="text-xs text-slate-500 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
            Gestión de usuarios y registros
          </p>
          <p class="text-xs text-slate-500 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
            Auditoría de participaciones
          </p>
          <p class="text-xs text-slate-500 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
            Reportes en tiempo real
          </p>
        </div>
      </section>

      <section class="bg-white/95 p-8 lg:p-12 flex flex-col justify-center relative">
        <div class="w-full max-w-xs mx-auto">
          <div class="mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-orange-50 rounded-2xl mb-4">
              <svg class="w-7 h-7 text-orange-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Acceso Admin</h2>
            <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales de seguridad.</p>
          </div>

          <form id="login-form" class="space-y-5">
            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Correo</label>
              <input
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-slate-700 text-base transition-all"
                id="username"
                placeholder="admin@feria.mx"
                required
                type="email"
              />
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
              <input
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-slate-700 text-base transition-all"
                id="password"
                placeholder="••••••••"
                required
                type="password"
              />
            </div>

            <div id="error-message" class="error-box items-center gap-2 bg-red-50 text-red-700 rounded-lg px-3 py-2 text-xs">
              <span>⚠️</span>
              <p id="error-text">Credenciales no válidas.</p>
            </div>

            <button
              class="w-full orange-button text-white font-bold py-3.5 rounded-xl shadow-md mt-4 text-lg active:scale-95 transition-transform flex items-center justify-center gap-2"
              type="submit"
            >
              <span id="btn-text">Ingresar</span>
              <svg id="btn-spinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
            </button>
          </form>
        </div>

        <a href="../index.html" class="absolute bottom-6 right-8 flex items-center gap-1.5 text-slate-400 hover:text-orange-700 transition-colors font-medium text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          Volver
        </a>
      </section>
    </div>
  </main>

  <script>
    const API = "http://127.0.0.1:8000/api/v1";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error-message");
      const errorTxt = document.getElementById("error-text");
      const spinner = document.getElementById("btn-spinner");
      const btnText = document.getElementById("btn-text");

      errorBox.classList.remove("show");
      errorTxt.textContent = "";
      spinner.classList.remove("hidden");
      btnText.textContent = "Ingresando...";

      try {
        const res = await fetch(`${API}/users/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Credenciales incorrectas");
        }

        if (!data.access_token) {
          throw new Error("No se recibió access_token del backend");
        }

        localStorage.setItem("token", data.access_token);
        localStorage.setItem("token_type", data.token_type || "bearer");
        localStorage.setItem("role", "admin");
        localStorage.setItem("admin_email", email);

        window.location.href = "portal_admin.html";

      } catch (err) {
        errorTxt.textContent = err.message || "Failed to fetch";
        errorBox.classList.add("show");
      } finally {
        spinner.classList.add("hidden");
        btnText.textContent = "Ingresar";
      }
    });
  </script>
</body>
</html>
