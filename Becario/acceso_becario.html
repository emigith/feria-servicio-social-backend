<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Acceso Becario | Feria de Servicio Social</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Lexend', sans-serif;
    }

    .bg-purple-lava {
      background: linear-gradient(-45deg, #2e1065, #4c1d95, #7e22ce, #4c1d95);
      background-size: 400% 400%;
      animation: purpleFlow 12s ease infinite;
    }

    @keyframes purpleFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .purple-button {
      background-color: #581c87;
      transition: all 0.2s ease;
    }

    .purple-button:hover {
      background-color: #4c1d95;
      transform: translateY(-1px);
    }

    .error-box {
      display: none;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .error-box.show {
      display: flex;
      opacity: 1;
    }
  </style>
</head>

<body class="min-h-screen bg-purple-lava flex items-center justify-center p-6">
  <main class="w-full max-w-md">
    <div class="glass-card rounded-[2.5rem] shadow-2xl p-10 md:p-12 relative overflow-hidden">

      <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-100 rounded-full blur-3xl opacity-50"></div>

      <header class="text-center mb-10 relative">
        <div
          class="inline-flex items-center justify-center w-16 h-16 bg-purple-50 rounded-2xl mb-6 border border-purple-100">
          <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"
              stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Becario</h1>
        <p class="text-slate-500 text-sm mt-2">Gestión de códigos OTP</p>
      </header>

      <form id="login-form" class="space-y-6 relative">
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1">Correo</label>
          <input
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 transition-all placeholder:text-slate-300"
            id="username" placeholder="becario@feria.mx" required type="email" />
        </div>

        <div class="space-y-1">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] ml-1">Contraseña</label>
          <input
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 transition-all placeholder:text-slate-300"
            id="password" placeholder="••••••••" required type="password" />
        </div>

        <div id="error-message"
          class="error-box items-center gap-2 bg-red-50 text-red-600 rounded-xl px-4 py-3 text-xs border border-red-100">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <p id="error-text">Datos de acceso incorrectos.</p>
        </div>

        <button
          class="w-full purple-button text-white font-bold py-4 rounded-2xl shadow-lg mt-2 text-lg active:scale-95 transition-all flex items-center justify-center gap-2"
          type="submit">
          <span id="btn-text">Ingresar</span>
          <svg id="btn-spinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
          </svg>
        </button>
      </form>

      <div class="mt-10 pt-6 border-t border-slate-100 flex justify-center">
        <a href="../index.html"
          class="flex items-center gap-1.5 text-slate-400 hover:text-purple-700 transition-colors font-medium text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          Volver
        </a>
      </div>
    </div>
  </main>

  <script>
    const API = 'http://127.0.0.1:8000/api/v1';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');

      // Reset de UI
      errorMessage.classList.remove('show');
      btnText.classList.add('hidden');
      btnSpinner.classList.remove('hidden');

      try {
        const res = await fetch(`${API}/users/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();
        console.log("Datos recibidos:", data); // ESTO ES PARA DEPURAR
        console.log("Rol detectado:", data.role);

        if (!res.ok) {
          throw new Error(data.detail || 'Credenciales incorrectas.');
        }

        // CORRECCIÓN DE PERMISOS: Aceptamos 'intern' (becario) o 'admin'
        const rolesPermitidos = ['intern', 'admin'];

        if (!rolesPermitidos.includes(data.role)) {
          throw new Error('No tienes permisos de Becario o Administrador.');
        }

        // Guardamos sesión
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('role', data.role);

        // REDIRECCIÓN: Cambia 'portal_SF.html' por tu dashboard de becario
        // Por ejemplo: 'dashboard_becario.html' o 'inicio_becario.html'
        window.location.href = 'escaner_becario.html';

      } catch (err) {
        errorMessage.querySelector('p').textContent = err.message;
        errorMessage.classList.add('show');
      } finally {
        btnText.classList.remove('hidden');
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
  </script>
</body>

</html>
