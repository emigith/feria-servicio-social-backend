<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Acceso Becario | Feria de Servicio Social</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Lexend', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .bg-purple-lava {
      background: linear-gradient(-45deg, #2e1065, #4c1d95, #6b21a8, #7e22ce, #9333ea, #c084fc);
      background-size: 400% 400%;
      animation: purpleLava 14s ease infinite;
    }

    @keyframes purpleLava {
      0% {
        background-position: 0% 50%;
      }
      25% {
        background-position: 50% 100%;
      }
      50% {
        background-position: 100% 50%;
      }
      75% {
        background-position: 50% 0%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .purple-button {
      background-color: #3b0764;
      transition: all 0.25s ease;
    }

    .purple-button:hover {
      background-color: #4c1d95;
      transform: translateY(-2px);
    }

    .back-link {
      transition: all 0.25s ease;
    }

    .back-link:hover {
      transform: translateX(-4px);
      color: #3b0764;
    }

    .error-box {
      display: none;
    }

    .error-box.show {
      display: flex;
    }
  </style>
</head>

<body class="bg-purple-lava min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-5xl min-h-[75vh] flex flex-col">
    <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-16 h-full flex flex-col justify-center">

      <header class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-slate-50 rounded-3xl mb-8">
          <svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold text-slate-800 tracking-tight">
          Acceso Becario
        </h1>
        <p class="text-slate-500 text-lg md:text-xl mt-4">
          Panel exclusivo para coordinadores de Servicio Social
        </p>
      </header>

      <form class="space-y-8 max-w-2xl mx-auto w-full" id="login-form" method="POST">
        <div class="space-y-2">
          <label class="text-base font-semibold text-slate-600 uppercase tracking-wider ml-1" for="username">
            Usuario
          </label>
          <div class="relative">
            <input
              class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:border-transparent transition-all outline-none text-slate-700 text-xl focus:ring-purple-500"
              id="username"
              name="username"
              placeholder="becario.social"
              required
              type="text"
            />
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-base font-semibold text-slate-600 uppercase tracking-wider" for="password">
              Contraseña
            </label>
          </div>
          <div class="relative">
            <input
              class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:border-transparent transition-all outline-none text-slate-700 text-xl focus:ring-purple-500"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              type="password"
            />
          </div>
        </div>

        <div id="error-message" class="error-box items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl px-5 py-4">
          <svg class="w-6 h-6 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 9v3.75m0 3.75h.008v.008H12v-.008z"></path>
            <path d="M10.29 3.86L1.82 18a2.25 2.25 0 001.93 3.375h16.5A2.25 2.25 0 0022.18 18L13.71 3.86a2.25 2.25 0 00-3.42 0z" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <div>
            <p class="font-semibold">Acceso denegado</p>
            <p class="text-sm mt-1">
              El usuario o la contraseña son incorrectos. Verifica tus datos e inténtalo de nuevo.
            </p>
          </div>
        </div>

        <button
          class="w-full purple-button text-white font-semibold py-6 rounded-2xl active:scale-[0.98] transition-all shadow-xl mt-10 text-2xl"
          type="submit">
          Ingresar
        </button>
      </form>

      <div class="w-full flex justify-end mt-8">
        <button
          type="button"
          onclick="window.location.href='../index.html'"
          class="back-link flex items-center gap-2 text-slate-600 font-semibold text-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          Volver
        </button>
      </div>

    </div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errorMessage = document.getElementById("error-message");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      // Cambia estas credenciales por las que tú quieras usar para prueba
      const usuarioCorrecto = "becario.social";
      const contrasenaCorrecta = "123456";

      if (username === usuarioCorrecto && password === contrasenaCorrecta) {
        errorMessage.classList.remove("show");
        window.location.href = "portal_becario.html";
      } else {
        errorMessage.classList.add("show");
      }
    });
  </script>
</body>
</html>
