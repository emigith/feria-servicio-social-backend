<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#dbeafe",
                        "background-dark": "#221610",
                        "navy-accent": "#1a2a40",
                        "border-soft": "#d1dce5"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Pre-Registro | Servicio Social 2026</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-border-soft dark:border-slate-800 overflow-hidden">
<div class="p-8 md:p-12">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold text-navy-accent dark:text-white mb-2">Pre-Registro</h1>
<p class="text-slate-500 dark:text-slate-400">Completa el formulario para asegurar tu lugar en el programa.</p>
</div>
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Nombre completo</label>
<input class="w-full px-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Ingresa tu nombre completo" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Matrícula</label>
<input class="w-full px-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="A0xxxxxxx" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Correo institucional</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">alternate_email</span>
<input class="w-full pl-11 pr-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="usuario@tec.mx" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Correo personal</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-11 pr-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="ejemplo@gmail.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Día</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all pr-10">
<option value="">Selecciona una fecha</option>
<option value="2026-10-24">Octubre 24, 2026</option>
<option value="2026-10-25">Octubre 25, 2026</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-navy-accent dark:text-slate-200">Hora</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-3 rounded-lg border border-border-soft dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all pr-10">
<option value="">Selecciona un horario</option>
<option value="09:00">09:00 AM (Cupo: 100)</option>
<option value="09:30">09:30 AM (Cupo: 100)</option>
<option value="10:00">10:00 AM (Cupo: 100)</option>
<option value="10:30">10:30 AM (Cupo: 100)</option>
<option value="11:00">11:00 AM (Cupo: 100)</option>
<option value="11:30">11:30 AM (Cupo: 100)</option>
<option value="12:00">12:00 PM (Cupo: 100)</option>
<option value="12:30">12:30 PM (Cupo: 100)</option>
<option value="13:00">01:00 PM (Cupo: 100)</option>
<option value="13:30">01:30 PM (Cupo: 100)</option>
<option value="14:00">02:00 PM (Cupo: 100)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">schedule</span>
</div>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-navy-accent hover:bg-slate-800 text-white font-bold py-4 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2" type="submit">
<span>Registrarse</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
</form>
</div>
</div>
</main>
<footer class="w-full py-8 text-center border-t border-border-soft dark:border-slate-800">
<p class="text-xs font-semibold tracking-widest text-slate-400 dark:text-slate-500 uppercase">
            TECNOLÓGICO DE MONTERREY - SERVICIO SOCIAL 2026
        </p>
</footer>
</body></html>
