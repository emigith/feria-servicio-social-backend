<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feria de Servicio Social - TEC CCM</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "tec-purple": "#2d2079",
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    body {
      background-color: #291c74;
      margin: 0;
      color: white;
      overflow-x: hidden;
    }

    .logo-container {
      transition: transform 0.35s ease;
      cursor: pointer;
      position: relative;
    }

    .logo-container:hover {
      transform: scale(1.05);
    }

    .role-button {
      transition: all 0.3s ease;
    }

    .role-button:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .secret-menu {
      display: none;
      position: absolute;
      top: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #2d2079;
      border-radius: 1rem;
      padding: 0.75rem;
      min-width: 220px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      z-index: 50;
    }

    .secret-menu.show {
      display: block;
    }

    .secret-option {
      width: 100%;
      text-align: center;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      font-weight: 600;
      transition: background 0.2s ease;
      border: none;
      background: white;
      color: #2d2079;
      cursor: pointer;
    }

    .secret-option:hover {
      background: #f3f4f6;
    }
  </style>
</head>

<body class="antialiased flex flex-col items-center justify-center min-h-screen w-full">
  <main class="flex flex-col items-center justify-center w-full max-w-4xl px-6 text-center">

    <div class="logo-container mb-8" id="secret-button">
      <img
        alt="TEC CCM Logo"
        class="w-48 h-auto md:w-64 shadow-none"
        id="central-logo"
        src="assets/logo.jpg"
      />

      <div id="secret-menu" class="secret-menu">
        <button
          class="secret-option block"
          onclick="window.location.href='Becario/acceso_becario.html'">
          Becario
        </button>

        <button
          class="secret-option block mt-2"
          onclick="window.location.href='Administrador/acceso_administrador.html'">
          Administrador
        </button>
      </div>
    </div>

    <div class="mb-12">
      <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-2">
        TEC CCM
      </h1>
      <p class="text-lg md:text-xl font-light tracking-[0.3em] uppercase opacity-90">
        Feria de Servicio Social
      </p>
    </div>

    <div class="flex flex-col items-center w-full">
      <p class="text-sm font-bold tracking-[0.2em] mb-8 opacity-80 uppercase">
        Selecciona tu usuario
      </p>

      <div class="flex flex-col sm:flex-row gap-6 w-full justify-center">

        <button
          class="role-button flex flex-col items-center justify-center p-8 rounded-3xl w-full sm:w-64 aspect-square md:aspect-auto md:h-48 bg-white text-tec-purple"
          onclick="window.location.href='Socio_Formador/acceso_socioformados.html'">
          <svg class="w-12 h-12 mb-4" fill="none" stroke="#2d2079" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
          </svg>
          <span class="text-xl font-semibold">Socio_Formador</span>
        </button>

        <button
          class="role-button flex flex-col items-center justify-center p-8 rounded-3xl w-full sm:w-64 aspect-square md:aspect-auto md:h-48 bg-white text-tec-purple"
          onclick="window.location.href='Estudiante/estudiante_inicio.html'">
          <svg class="w-12 h-12 mb-4" fill="none" stroke="#2d2079" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14l9-5-9-5-9 5 9 5z"></path>
            <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
            <path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
          </svg>
          <span class="text-xl font-semibold">Alumno</span>
        </button>

      </div>
    </div>
  </main>

  <footer class="w-full text-center px-4 mt-12 mb-6">
    <p class="text-[10px] md:text-xs tracking-[0.4em] uppercase opacity-50 font-medium">
      Tecnológico de Monterrey — Servicio Social 2026
    </p>
  </footer>

  <script>
    const logo = document.getElementById("central-logo");
    const secretMenu = document.getElementById("secret-menu");
    const secretButton = document.getElementById("secret-button");

    logo.addEventListener("click", function (event) {
      event.stopPropagation();
      secretMenu.classList.toggle("show");
    });

    document.addEventListener("click", function (event) {
      if (!secretButton.contains(event.target)) {
        secretMenu.classList.remove("show");
      }
    });
  </script>
</body>
</html>
